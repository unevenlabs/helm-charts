# Values for the upstream argo-cd subchart.
# All upstream configuration goes under the "argo-cd" key.
argo-cd:
  enabled: true

# Custom values for the Istio VirtualService and AuthorizationPolicy templates.
# These are not part of the upstream chart.
# -- Must match the upstream argo-cd default nameOverride so helpers resolve to the correct service name
# when called from parent chart context (e.g. in VirtualService/AuthorizationPolicy templates)
nameOverride: argocd

server:
  # -- Must match argo-cd.server.name; used by argo-cd.server.fullname helper when called from parent chart context
  name: server
  # -- Port used by the VirtualService destination (must match argo-cd.server.service.servicePortHttp)
  service:
    servicePortHttp: 80

  virtualService:
    public:
      enabled: true
      gateways: ["default/default-gateway"]
      annotations: {}
      hosts: []
      whiteListed:
        ips: []
    internal:
      enabled: true
      gateways: ["default/default-gateway"]
      annotations: {}
      hosts: []
      whiteListed:
        ips: []
        namespaces: []
